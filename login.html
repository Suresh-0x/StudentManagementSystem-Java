<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .password-box{
            position:relative;
        }

        .password-box input{
            width:100%;
            padding-right:50px;
        }

        .eye-icon{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2 class="main-heading">
        Student Management System
    </h2>

    <h1>
        Admin Login
    </h1>

    <form action="LoginServlet"
          method="post">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <div class="password-box">

            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <span class="eye-icon"
                  onclick="togglePassword()">
                👁️
            </span>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script>

function togglePassword(){

    let pass =
    document.getElementById("password");

    if(pass.type==="password"){
        pass.type="text";
    }
    else{
        pass.type="password";
    }
}

</script>

</body>
</html>
