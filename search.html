<!DOCTYPE html>
<html>

<head>

    <title>Search Student</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <h2 class="main-heading">

        Student Management System

    </h2>

    <h1>

        Search Student

    </h1>

    <form action="SearchStudentServlet"
          method="get">

        <input type="number"
               name="student_id"
               placeholder="Enter Student ID"
               required>

        <button type="submit">

            Search

        </button>

    </form>

</div>

</body>
</html>
